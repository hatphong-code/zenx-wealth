<!doctype html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--zx-font-body);}
  .wrap{display:flex;}
  .half{flex:1;padding:30px 28px;display:flex;align-items:center;gap:13px;}
  .y{background:#FBF4EA;}
  .m{background:#0C1420;}
  .badge{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#C8643C,#B07D3F);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;font-family:'Bricolage Grotesque',sans-serif;}
  .mono{width:42px;height:42px;border-radius:50%;border:1px solid #C9A24B;color:#C9A24B;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:15px;}
  .wm-y{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px;color:#C8643C;}
  .wm-m{font-family:'Playfair Display',serif;font-weight:600;font-size:21px;color:#ECE5D6;}
  .sub{font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:#C9A24B;font-weight:600;}
</style></head>
<body><div class="wrap">
  <div class="half y"><div class="badge">Z</div><div class="wm-y">ZenX Wealth</div></div>
  <div class="half m"><div class="mono">ZX</div><div><div class="wm-m">ZenX Wealth</div><div class="sub">Private</div></div></div>
</div></body></html>
