<!-- @dsCard group="Colors" viewport="700x210" name="Trẻ · Ấm — màu ngữ nghĩa" subtitle="Light, warm — terracotta · sage · bronze trên nền kem" -->
<!doctype html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--zx-font-body);}
  .wrap{padding:22px 24px;background:var(--zx-bg);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .sw{width:104px;}
  .chip{height:52px;border-radius:12px;border:1px solid rgba(0,0,0,.06);}
  .nm{font-size:12px;font-weight:600;color:var(--zx-text);margin-top:8px;}
  .hx{font-size:11px;color:var(--zx-text-soft);font-variant-numeric:tabular-nums;}
</style></head>
<body><div class="wrap" data-theme="young">
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--zx-bg)"></div><div class="nm">bg</div><div class="hx">#FBF4EA</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-surface)"></div><div class="nm">surface</div><div class="hx">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-accent)"></div><div class="nm">accent</div><div class="hx">#C8643C</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-gold-fg)"></div><div class="nm">gold</div><div class="hx">#B07D3F</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-positive)"></div><div class="nm">positive</div><div class="hx">#5E7E5A</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-accent-soft)"></div><div class="nm">accent-soft</div><div class="hx">#F8E5D9</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-line)"></div><div class="nm">line</div><div class="hx">#EFE4D4</div></div>
  </div>
</div></body></html>
