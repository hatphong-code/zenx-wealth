<!doctype html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">

  <div class="demo" data-theme="young"><div class="card"><span class="tag" style="color:#3A2E26">Trẻ · Ấm</span></div>

  <div class="demo" data-theme="mid" style="background:#0C1420;border-radius:14px;"><div class="card"><span class="tag" style="color:#ECE5D6">Trung niên · Tư gia</span></div>
