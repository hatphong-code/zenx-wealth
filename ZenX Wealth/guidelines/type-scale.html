<!doctype html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;font-family:var(--zx-font-body);color:#3A2E26;}
  .wrap{padding:18px 26px;}
  .r{display:flex;align-items:baseline;gap:16px;padding:6px 0;border-bottom:1px solid #F1ECE2;}
  .r:last-child{border-bottom:none;}
  .tok{width:120px;font-size:12px;color:#92806F;font-variant-numeric:tabular-nums;}
  .sz{width:54px;font-size:12px;color:#C8643C;font-weight:600;}
  .ex{font-weight:600;}
</style></head>
<body><div class="wrap">
  <div class="r"><span class="tok">eyebrow</span><span class="sz">11</span><span class="ex" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#92806F">Dòng tiền ròng</span></div>
  <div class="r"><span class="tok">body</span><span class="sz">14</span><span class="ex" style="font-size:14px;font-weight:400">Giảm ăn ngoài tuần này</span></div>
  <div class="r"><span class="tok">title</span><span class="sz">17</span><span class="ex" style="font-size:17px">Tiêu điểm tuần</span></div>
  <div class="r"><span class="tok">h1</span><span class="sz">24</span><span class="ex" style="font-size:24px">Quỹ dự phòng</span></div>
  <div class="r"><span class="tok">display</span><span class="sz">40+</span><span class="ex" style="font-size:40px;font-family:var(--zx-font-display);letter-spacing:-.02em">+12,5 tr</span></div>
</div></body></html>
