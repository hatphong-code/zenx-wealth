<!-- @dsCard group="Colors" viewport="700x180" name="Bảng màu thương hiệu" subtitle="Hai họ màu: đất ấm (Trẻ) và navy–vàng đồng (Trung niên)" -->
<!doctype html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--zx-font-body);background:#fff;}
  .wrap{padding:20px 24px;}
  .grp{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#92806F;font-weight:600;margin:0 0 10px;}
  .row{display:flex;gap:10px;margin-bottom:16px;}
  .sw{text-align:center;}
  .chip{width:84px;height:40px;border-radius:9px;border:1px solid rgba(0,0,0,.06);}
  .nm{font-size:10.5px;color:#3A2E26;margin-top:5px;font-variant-numeric:tabular-nums;}
</style></head>
<body><div class="wrap">
  <div class="grp">Đất ấm — Trẻ</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#C8643C"></div><div class="nm">Terracotta</div></div>
    <div class="sw"><div class="chip" style="background:#B0552F"></div><div class="nm">Clay</div></div>
    <div class="sw"><div class="chip" style="background:#5E7E5A"></div><div class="nm">Sage</div></div>
    <div class="sw"><div class="chip" style="background:#B07D3F"></div><div class="nm">Bronze</div></div>
    <div class="sw"><div class="chip" style="background:#FBF4EA"></div><div class="nm">Cream</div></div>
    <div class="sw"><div class="chip" style="background:#3A2E26"></div><div class="nm">Brown</div></div>
  </div>
  <div class="grp">Navy &amp; vàng đồng — Trung niên</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0C1420"></div><div class="nm">Navy</div></div>
    <div class="sw"><div class="chip" style="background:#101B2B"></div><div class="nm">Navy-2</div></div>
    <div class="sw"><div class="chip" style="background:#C9A24B"></div><div class="nm">Gold</div></div>
    <div class="sw"><div class="chip" style="background:#9E7E37"></div><div class="nm">Gold-deep</div></div>
    <div class="sw"><div class="chip" style="background:#ECE5D6"></div><div class="nm">Ivory</div></div>
    <div class="sw"><div class="chip" style="background:#8A93A1"></div><div class="nm">Slate</div></div>
  </div>
</div></body></html>
