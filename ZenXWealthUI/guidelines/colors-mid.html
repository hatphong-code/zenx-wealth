<!doctype html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--zx-font-body);}
  .wrap{padding:22px 24px;background:var(--zx-bg);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .sw{width:104px;}
  .chip{height:52px;border-radius:12px;border:1px solid rgba(255,255,255,.08);}
  .nm{font-size:12px;font-weight:600;color:var(--zx-text);margin-top:8px;}
  .hx{font-size:11px;color:var(--zx-text-soft);font-variant-numeric:tabular-nums;}
</style></head>
<body><div class="wrap" data-theme="mid">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0C1420"></div><div class="nm">bg</div><div class="hx">#0C1420</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-surface)"></div><div class="nm">surface</div><div class="hx">#101B2B</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-accent)"></div><div class="nm">accent / gold</div><div class="hx">#C9A24B</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-gold-deep)"></div><div class="nm">gold-deep</div><div class="hx">#9E7E37</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-positive)"></div><div class="nm">positive</div><div class="hx">#86A98C</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-ivory)"></div><div class="nm">ivory (text)</div><div class="hx">#ECE5D6</div></div>
    <div class="sw"><div class="chip" style="background:var(--zx-slate)"></div><div class="nm">slate (soft)</div><div class="hx">#8A93A1</div></div>
  </div>
</div></body></html>
